# This is the workflow name
name: Hello Workflow

on:
  push:
    branches: [main]

# Jobs inside workflow
jobs:

  # Job name
  greet:
    runs-on: ubuntu-latest

    steps:
      - name: say hello to users
        run: echo "hello dosto"

      - name: say hello to username
        run: echo "hello to new $USER"
  details:
     runs-on: ubuntu-latest


     steps:
      - name: show details of oython version and docker version
        run: docker --version && python --version


     steps:
       - name: show all the versions of docker and opython
         run: docker --verision && python --version
